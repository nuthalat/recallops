name: incidentecho

services:
  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      INCIDENTECHO_DATABASE_URL: postgresql+asyncpg://incidentecho:incidentecho@postgres:5432/incidentecho
    ports:
      - "${INCIDENTECHO_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:0.8.2-pg17
    environment:
      POSTGRES_DB: incidentecho
      POSTGRES_USER: incidentecho
      POSTGRES_PASSWORD: ${INCIDENTECHO_DATABASE_PASSWORD:-incidentecho}
    volumes:
      - incidentecho-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incidentecho -d incidentecho"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  incidentecho-postgres:
