name: recallops

services:
  api:
    build:
      context: .
    environment:
      RECALLOPS_DATABASE_URL: postgresql+asyncpg://recallops:recallops@postgres:5432/recallops
    ports:
      - "${RECALLOPS_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:0.8.2-pg17
    environment:
      POSTGRES_DB: recallops
      POSTGRES_USER: recallops
      POSTGRES_PASSWORD: ${RECALLOPS_DATABASE_PASSWORD:-recallops}
    volumes:
      - recallops-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recallops -d recallops"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  recallops-postgres:
