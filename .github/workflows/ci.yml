name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg17
        env:
          POSTGRES_DB: recallops_test
          POSTGRES_USER: recallops
          POSTGRES_PASSWORD: recallops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recallops -d recallops_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      RECALLOPS_DATABASE_URL: postgresql+asyncpg://recallops:recallops@localhost:5432/recallops_test
      RECALLOPS_TEST_DATABASE_URL: postgresql+asyncpg://recallops:recallops@localhost:5432/recallops_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.17"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --frozen --all-groups
      - run: uv run alembic upgrade head
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyright
      - run: uv run pytest

  container:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: recallops:test
          cache-from: type=gha
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: recallops:test
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: "1"
